global:
  # PullPolicy and PullSecrets overrides for all images
  imagePullSecrets: []
  imagePullPolicy: ""
  # Labels and annotations applied to all resources
  commonLabels: {}
  commonAnnotations: {}
  # do not specify labelSelector or matchLabelKeys here, they are set in the templates
  topologySpreadConstraints: []
  clusterDomain: "cluster.local"
  service:
    trafficDistribution: ""
  certManager:
    # Use certManager to create issuers used for client certificates and credential signing
    createIssuers: true
    clientCertificate:
      issuerRef: common
    credentialSigning:
      issuerRef: creds
      privateKeyAlgorithm: ECDSA
      privateKeySize: 256

tenant:
  # Logical tenant identifier, used in configs and hostnames
  id: ""
  # If empty, .Release.Namespace will be used. But should this even be a thing? Helm can manage the namespace right?
  namespace: ""
  displayName: ""

gateway:
  # Shared Gateway to attach HTTPRoutes to
  name: ""
  namespace: ""

domain:
  # Base domain used for building hostnames; you can override each hostname explicitly if needed.
  root: ""

# Optional overrides; defaults are built from tenant.id and domain.root in templates
hostnames:
  issuerRegistry: ""
  issuer: ""
  verifier: ""
  walletBackend: ""
  walletFrontend: ""

features:
  # Set production mode to false for development mode with debug logging
  production: false
  singleTenant: true
  createNamespace: true
  generateSecrets: true
  requireInvite: true
  otlpCollector: false
  branding:
    # Only PNG images are supported (used by verifier and issuer-apigw)
    faviconDataUrl: ""
    logoDataUrl: ""
  # Example configuration for extra issuers and verifiers (used by PDP and wallet-backend)
  # extraIssuers:
  #   - displayName: "Foobar Inc. - Primary"
  #     url: https://issuer-1.example.com
  #   - displayName: "Foobar Inc. - Secondary"
  #     url: https://issuer-2.example.com
  #     clientId: "not-the-default-frontend-base-url"
  # extraVerifiers:
  #   - displayName: "Foobar Inc."
  #     url: https://verifier.example.com
  extraIssuers: []
  extraVerifiers: []
  # Example configuration for extra wallets (used by verifier and issuer-apigw)
  # extraWallets:
  #   - displayName: "Foobar Inc."
  #     url: https://wallet.example.com/id/foobar
  extraWallets: []
  # Example configuration for extra credential types (used by issuer components, verifier and
  # registry in wallet-backend)
  # credentialTypes:
  #   "demo_2":
  #     vct: urn:demo:2
  #     format: dc+sd-jwt
  #     issuance:
  #       authProvider: openid4vp
  #       source: "datastore"
  #       authOptions:
  #         scopes:
  #           pid_1_5:
  #             claims:
  #               - given_name
  #               - birthdate
  #     vctm:
  #       data: <JSON STRING DATA>
  #   "demo_3":
  #     vct: urn:demo:3
  #     format: dc+sd-jwt
  #     issuance:
  #       authProvider: oidc
  #       source: "datastore" # or "assertion" if the credential should be built dynamically via oidc claims
  #       authOptions:
  #         claims:
  #           - given_name
  #           - family_name
  #           - birthdate 
  #     vctm:
  #       file: config/demo/vctm_demo_3.json
  credentialTypes: {}

pdp:
  # whitelist_template uses extraIssuers and extraVerifiers to build a URL whitelist
  # and ignores any other configuration.
  default_whitelist: true
  externalUrl: "http://pdp"
  # See go-trust config for more details.
  # https://github.com/sirosfoundation/go-trust/
  extraRegistries: {}

issuer:
  # max 1MB in total, use the API if you need more, since the feature is for quick testing.
  # !!! credentials are only added on initialization of the database !!!
  identitymappingImport:
    identities: {}
    users: []
  datastoreImport:
    documents: {}
    users: []
  datasourceAssertion: {}
  apiAuth:
    jwks:
      enabled: false
      jwksData: ""
      issuer: ""
    oidc:
      enabled: false
      issuerUrl: ""
      clientId: ""
      redirectUri: ""
      scopes: ["openid", "email"]
    
  authProviders:
    oidc:
      enabled: false
      #issuerUrl: "https://demo-sso.common.siros.org/realms/demo"
      #clientId: "demo-issuer-shared"
      issuerUrl: ""
      clientId: ""

verifier:
  oidc_provider:
    enabled: true
  # Example configuration for extra presentation request templates
  # presentationRequestTemplates:
  #   "demo_3-all":
  #     enabled: true
  #     name: "demo_3 - All claims"
  #     description: "Request all claims for demo credentials"
  #     version: "1.0"
  #     oidc_scopes:
  #       - "demo_3-all"
  #     dcql:
  #       credentials:
  #         - id: "demo_3"
  #           format: "dc+sd-jwt"
  #           meta:
  #             vct_values:
  #               - "urn:demo:3"
  #           claims:
  #             - path: ["given_name"]
  #             - path: ["family_name"]
  #             - path: ["email"]
  #     claim_mappings:
  #       "*": "*"
  presentationRequestTemplates: {}
  presets: {}


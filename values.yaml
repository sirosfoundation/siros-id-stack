  policyLinks: "Privacy Policy::https://siros.org/policies/privacy-policy,End User License Agreement::https://siros.org/policies/end-user-license-agreement"
  wellknownAppleAppIds: "X3YM693CZ3.org.siros.id,W36S8KLY7S.com.netzarchitekten.funkewallet,X3YM693CZ3.org.siros.wwwallet"
  wellknownAndroidPackageNamesAndFingerprints: "io.yubicolabs.wwwwallet::E9:E7:07:2D:01:F5:D0:A8:B0:54:11:54:18:24:F0:19:EF:89:98:AE:EA:76:AA:A0:8E:DA:23:CC:C8:B7:DB:69,io.yubicolabs.wwwwallet::0C:4B:DE:80:E6:A4:F3:B3:19:58:2E:A9:1B:20:DA:DE:1A:8A:9C:DC:29:B5:1B:FC:89:37:90:B2:C6:8C:D8:C1,io.yubicolabs.wwwwallet::42:3A:33:70:A7:6D:C7:21:74:C2:FA:4B:26:EC:75:CC:08:B8:B5:0B:D0:D1:88:D3:BF:04:0A:B5:AB:CA:7B:7C,io.yubicolabs.wwwwallet::19:0D:81:C7:20:87:28:D1:CF:25:93:5D:6C:75:CE:4B:8A:A3:68:0C:8A:9A:7D:8B:FF:1A:E2:95:7B:F8:8A:F0,org.siros.id::42:3A:33:70:A7:6D:C7:21:74:C2:FA:4B:26:EC:75:CC:08:B8:B5:0B:D0:D1:88:D3:BF:04:0A:B5:AB:CA:7B:7C,org.siros.id::0C:4B:DE:80:E6:A4:F3:B3:19:58:2E:A9:1B:20:DA:DE:1A:8A:9C:DC:29:B5:1B:FC:89:37:90:B2:C6:8C:D8:C1"
  # Optional: override favicon and logos (data URLs); theme JSON string
  faviconDataUrl: ""
  logoLightDataUrl: ""
  logoDarkDataUrl: ""
  theme: ""

# go-r2ps-service (WSCA-BE / Remote PKCS#11 Signing Service)
r2ps:
  enabled: false
  # Operating mode — comma-separated list of: wscd, wsca, admin, all
  mode: "all"
  logLevel: "WARN"
  # Admin API listen address (set empty to disable)
  adminListen: ":8081"
  # PKCS#11 HSM configuration
  pkcs11:
    # Path to the PKCS#11 shared library inside the container
    modulePath: "/usr/lib/softhsm/libsofthsm2.so"
    # Identify the token by label (preferred) or slot number
    tokenLabel: "r2ps"
    slotID: ""
    # Number of concurrent PKCS#11 sessions
    poolSize: "4"
    # hostPath for the directory containing the PKCS#11 module .so
    # Set this when the HSM library is not baked into the container image.
    # Example: /usr/lib/x86_64-linux-gnu/softhsm for SoftHSM on the node.
    hostPath: ""
    # hostPath for SoftHSM token storage (only for SoftHSM deployments)
    tokenHostPath: ""
  hsmTimeout: "5s"
  maxAttempts: "5"
  lockoutDuration: "15m"
  sessionTTL: "5m"
  # MongoDB lifecycle store — use uri to override the default mongodb uri
  store:
    uri: ""
    database: "r2ps"
    tlsEnabled: "true"
  # Prometheus ServiceMonitor
  metrics:
    enabled: false
    interval: "30s"
  # Extra env vars, volumes, and volume mounts for advanced use cases
  # (e.g. mounting a CloudHSM or YubiHSM PKCS#11 config)
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []

images:
  # Application images
  issuerRegistry: "ghcr.io/sirosfoundation/vc/registry:v0.6.5-sirosid.4"
  issuerApigw: "ghcr.io/sirosfoundation/vc/apigw:v0.6.5-sirosid.4"
  issuerCore: "ghcr.io/sirosfoundation/vc/issuer:v0.6.5-sirosid.4"
  verifier: "ghcr.io/sirosfoundation/vc/verifier:v0.6.5-sirosid.4"
  walletAdmin: "ghcr.io/sirosfoundation/go-wallet-admin:0.6.1"
  walletBackend: "ghcr.io/sirosfoundation/go-wallet-backend:0.6.1"
  walletFrontendConfig: "ghcr.io/sirosfoundation/wallet-frontend:0.5.0-1-sirosid.8"
  walletFrontendNginx: "ghcr.io/nginx/nginx-unprivileged:1.29.8-alpine"
  otlpCollector: "docker.io/jaegertracing/jaeger:2.15.1"
  pdp: "ghcr.io/sirosfoundation/go-trust:0dc98fb" # 0.6.0-ish
  r2ps: "ghcr.io/sirosfoundation/go-r2ps-service:0.1.0"
  # Init/sidecar images
  opsStackUtilities: "ghcr.io/sirosfoundation/ops_stack_utilities:0.2.0"
  alpine: "docker.io/library/alpine:3.23"
  # MongoDB
  mongoCommunityVersion: "7.0.24"

replicas:
  r2ps: 1
  otlpCollector: 1
  pdp: 1
  issuerRegistry: 1
  issuerApigw: 1
  issuerCore: 1
  verifier: 1
  walletBackend: 1
  walletFrontend: 1
  mongo: 3


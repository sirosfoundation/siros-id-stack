{{- $ns := include "siros-id.namespace" . -}}
---
{{ include "siros-id.certificate" (list . (dict
   "name" "mongodb-admin-client" "ou" "clients"
   "usages" (list "digital signature" "client auth"))) }}


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-tools
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict "reloader.stakater.com/auto" "true")) | nindent 2 }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-tools
  template:
    metadata:
      {{- include "siros-id.labels" (list . (dict
          "app.kubernetes.io/name" "admin-tools"
          "mongodb-access" "true")) | nindent 6 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: {{ .Values.resources.adminTools.requests.cpu }}
          memory: {{ .Values.resources.adminTools.requests.memory }}
        limits:
          cpu: {{ .Values.resources.adminTools.limits.cpu }}
          memory: {{ .Values.resources.adminTools.limits.memory }}
      volumes:
        - name: mongo-cert
          secret:
            secretName: mongodb-admin-client-cert
      containers:
        - name: main
          image: {{ .Values.images.opsStackUtilities | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: mongo-cert
              mountPath: /mongo-cert
              readOnly: true
          args:
            - sleep
            - infinity

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-tools
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: admin-tools
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb-svc
      ports:
        - port: 27017

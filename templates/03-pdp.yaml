{{- $ns := include "siros-id.namespace" . -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pdp-main
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
      external_url: {{ .Values.pdp.externalUrl }}
    logging:
      level: debug
      format: json
    registries:
    {{- if .Values.pdp.extraRegistries }}
      {{- toYamlPretty .Values.pdp.extraRegistries | nindent 6 }}
    {{- end }}
    {{- if .Values.pdp.default_whitelist }}
      whitelist:
        enabled: true
        name: Static allowlist
        description: Pre-configured URLs for trusted parties
        lists:
          # TODO: All issuers should not be PID provider, add another toggle for this.
          pid-issuers:
            - https://{{ include "siros-id.hostname.issuer" . }}
            {{- range .Values.features.extraIssuers }}
            - {{ .url }}
            {{- end }}
          verifiers:
            # Issuers are included as verifiers since they may use OpenID4VP to authorize issuance
            - https://{{ include "siros-id.hostname.issuer" . }}
            {{- range .Values.features.extraIssuers }}
            - {{ .url }}
            {{- end }}
            - https://{{ include "siros-id.hostname.verifier" . }}
            {{- range .Values.features.extraVerifiers }}
            - {{ .url }}
            {{- end }}
        actions:
          pid-provider: pid-issuers
          credential-issuer: pid-issuers
          verifier: verifiers
          credential-verifier: verifiers
    {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdp
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict "reloader.stakater.com/auto" "true")) | nindent 2 }}
spec:
  replicas: {{ .Values.replicas.pdp }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pdp
  template:
    metadata:
      {{- include "siros-id.labels" (list . (dict "app.kubernetes.io/name" "pdp")) | nindent 6 }}
    spec:
      {{- include "siros-id.topologySpreadConstraints" (list . "pdp") | nindent 6 }}
      {{- include "siros-id.imagePullSecrets" . | nindent 6 }}
      automountServiceAccountToken: false
      {{- include "siros-id.podSecurityContext" (dict "runAsUser" 65532) | nindent 6 }}
      resources:
        {{- toYamlPretty .Values.resources.pdp | nindent 8 }}
      volumes:
        - name: main-config
          configMap:
            name: pdp-main
      containers:
        - name: main
          image: {{ .Values.images.pdp | quote }}
          {{- include "siros-id.imagePullPolicy" . | nindent 10 }}
          {{- include "siros-id.containerSecurityContext" (dict) | nindent 10 }}
          ports:
            - name: http-main
              containerPort: 8080
          {{- include "siros-id.httpProbes" (dict "path" "/healthz" "port" "http-main" "readyPath" "/readyz") | nindent 10 }}
          volumeMounts:
            - name: main-config
              mountPath: /main-config
              readOnly: true
          args:
            - --config
            - /main-config/config.yaml

---
{{ include "siros-id.podDisruptionBudget" (list . (dict "name" "pdp" "minAvailable" .Values.podDisruptionBudget.pdp.minAvailable)) }}

---
apiVersion: v1
kind: Service
metadata:
  name: pdp
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}
spec:
  selector:
    app.kubernetes.io/name: pdp
  {{ with .Values.global.service.trafficDistribution }}
  trafficDistribution: {{ . }}
  {{ end }}
  ports:
    - name: http-main
      port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pdp
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pdp
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wallet-backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: verifier
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: issuer-apigw
      ports:
        - port: http-main
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: {{- include "siros-id.reservedNetworks.v4" . | nindent 14 }}
        - ipBlock:
            cidr: "::/0"
            except: {{- include "siros-id.reservedNetworks.v6" . | nindent 14 }}

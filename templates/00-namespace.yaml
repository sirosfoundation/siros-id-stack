{{- $ns := include "siros-id.namespace" . -}}
{{- if .Values.features.createNamespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict 
      "pod-security.kubernetes.io/enforce" "restricted" 
      "pod-security.kubernetes.io/enforce-version" "v1.35"
      "siros-gateway-access" "true")) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-admin-1
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}

---
apiVersion: v1
kind: Secret
metadata:
  name: tenant-admin-1
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict
      "kubernetes.io/service-account.name" "tenant-admin-1")) | nindent 2 }}
type: kubernetes.io/service-account-token

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: tenant-admin
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 -}}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: tenant-admin-1
    namespace: {{ $ns }}
roleRef:
  kind: ClusterRole
  name: siros-tenant-admin
  apiGroup: rbac.authorization.k8s.io
{{- end }}

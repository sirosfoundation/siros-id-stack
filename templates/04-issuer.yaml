      {{- include "siros-id.podSecurityContext" (dict "runAsUser" 10000) | nindent 6 }}
      resources:
        {{- toYamlPretty .Values.resources.issuerCore | nindent 8 }}
      volumes:
        - name: main-config
          configMap:
            name: issuer-core-main
        - name: vctms
          configMap:
            name: vctms
        - name: sign-cert
          secret:
            secretName: issuer-core-sign-cert
        - name: sign-cert-chain
          emptyDir: {}
        - name: server-cert
          secret:
            secretName: issuer-core-server-cert
        - name: client-cert
          secret:
            secretName: issuer-core-client-cert
      initContainers:
        {{- include "siros-id.certChainGenInitContainer" . | nindent 8 }}
      containers:
        - name: main
          image: {{ .Values.images.issuerCore | quote }}
          {{- include "siros-id.imagePullPolicy" . | nindent 10 }}
          {{- include "siros-id.containerSecurityContext" (dict) | nindent 10 }}
          ports:
            - name: grpc-main
              containerPort: 8090
            - name: http-health
              containerPort: 8081
          {{- include "siros-id.httpProbes" (dict "path" "/health" "port" "http-health") | nindent 10 }}
          env:
            - name: VC_CONFIG_YAML
              value: /main-config/config.yaml
          volumeMounts:
            - name: main-config
              mountPath: /main-config
              readOnly: true
            - name: vctms
              mountPath: /vctms
              readOnly: true
            - name: sign-cert
              mountPath: /sign-cert
              readOnly: true
            - name: sign-cert-chain
              mountPath: /sign-cert-chain
              readOnly: true
            - name: server-cert
              mountPath: /server-cert
              readOnly: true
            - name: client-cert
              mountPath: /client-cert
              readOnly: true

---
{{ include "siros-id.podDisruptionBudget" (list . (dict "name" "issuer-core" "minAvailable" .Values.podDisruptionBudget.issuerCore.minAvailable)) }}

---
{{ include "siros-id.service" (list . (dict "name" "issuer-core" "ports" (list
  (dict "name" "grpc-main" "port" 8090 "targetPort" 8090)))) }}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: issuer-core
  namespace: {{ $ns }}
  {{- include "siros-id.labels" (list . (dict)) | nindent 2 }}
  {{- include "siros-id.annotations" (list . (dict)) | nindent 2 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: issuer-core
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: issuer-apigw
      ports:
        - port: grpc-main
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otlp-collector
      ports:
        - port: grpc-otlp
        - port: http-otlp
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: issuer-registry
      ports:
        - port: grpc-main
